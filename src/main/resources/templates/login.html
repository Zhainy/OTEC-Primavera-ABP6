<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión - OTEC Primavera</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        /* Centrado absoluto para la pantalla de Login */
        body {
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }
        .login-card {
            max-width: 420px;
            width: 100%;
            padding: 3rem 2rem;
            text-align: center;
        }
        .login-logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }
        .login-logo i { color: var(--neon-blue); }

        /* Inputs con iconos */
        .input-icon-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-icon-wrapper i {
            position: absolute;
            left: 1rem;
            color: var(--text-muted);
            font-size: 1.1rem;
        }
        .input-icon-wrapper input {
            padding-left: 2.8rem; /* Espacio para el icono */
        }
    </style>
</head>
<body>

<div class="glass-card login-card">
    <div class="login-logo">
        <i class="bi bi-hexagon-fill"></i> OTEC Primavera
    </div>
    <p style="color: var(--text-secondary); margin-bottom: 2.5rem;">Ingresa al sistema de gestión académica</p>

    <div th:if="${param.error}" class="alert alert-danger compact-alert">
        <i class="bi bi-exclamation-circle-fill"></i> Credenciales incorrectas.
    </div>
    <div th:if="${param.logout}" class="alert alert-success compact-alert">
        <i class="bi bi-check-circle-fill"></i> Sesión cerrada correctamente.
    </div>

    <form th:action="@{/login}" method="post" style="text-align: left;">
        <div class="form-group" style="margin-bottom: 1.5rem;">
            <label for="username">Correo Electrónico</label>
            <div class="input-icon-wrapper">
                <i class="bi bi-envelope"></i>
                <input type="email" id="username" name="username" required placeholder="admin@otec.cl" autofocus>
            </div>
        </div>
        <div class="form-group" style="margin-bottom: 2rem;">
            <label for="password">Contraseña</label>
            <div class="input-icon-wrapper">
                <i class="bi bi-lock"></i>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>
        </div>

        <button type="submit" class="btn-primary" style="width: 100%; justify-content: center;">
            <i class="bi bi-box-arrow-in-right"></i> Acceder al Portal
        </button>
    </form>
</div>

</body>
</html>
