<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Programa - OTEC Primavera</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>
<div class="container" style="max-width: 800px; padding-top: 4rem;">
    <div class="glass-card">
        <h2><i class="bi bi-pencil-square"></i> Editar Programa Académico</h2>
        <p style="color: var(--text-secondary); margin-bottom: 2rem;">Modifica los detalles del curso seleccionado.</p>

        <form th:action="@{/admin/cursos/actualizar/{id}(id=${curso.id})}" th:object="${curso}" method="post">
            <div class="form-group" style="margin-bottom: 1.5rem;">
                <label for="nombre">Nombre del Programa</label>
                <input type="text" id="nombre" th:field="*{nombre}" required>
            </div>
            <div class="form-group" style="margin-bottom: 2rem;">
                <label for="descripcion">Descripción Técnica</label>
                <textarea id="descripcion" th:field="*{descripcion}" rows="4"></textarea>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <a th:href="@{/admin/dashboard}" style="color: var(--text-secondary); text-decoration: none;"><i class="bi bi-arrow-left"></i> Volver</a>
                <button type="submit" class="btn-primary">Actualizar Cambios</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
