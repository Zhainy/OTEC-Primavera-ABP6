<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Programa - OTEC Primavera</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="container container-narrow">
    <div class="glass-card">
        <h2><i class="bi bi-pencil-square"></i> Editar Programa Academico</h2>
        <p class="help-text">Modifica los detalles del curso seleccionado.</p>

        <form th:action="@{/admin/cursos/actualizar/{id}(id=${curso.id})}" th:object="${curso}" method="post" id="editForm">
            <div class="form-group spaced-group">
                <label for="nombre">Nombre del Programa</label>
                <input type="text" id="nombre" th:field="*{nombre}" required>
            </div>
            <div class="form-group spaced-group">
                <label for="descripcion">Descripcion Tecnica</label>
                <textarea id="descripcion" th:field="*{descripcion}" rows="4"></textarea>
            </div>
            <div class="form-row-between">
                <a th:href="@{/admin/dashboard}" class="link-muted"><i class="bi bi-arrow-left"></i> Volver</a>
                <button type="button" class="btn-primary" data-bs-toggle="modal" data-bs-target="#confirmEditModal">Actualizar Cambios</button>
            </div>
        </form>
    </div>
</div>

<div class="modal fade" id="confirmEditModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content dark-modal">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-pencil-square"></i> Confirmar actualizacion</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Cerrar"></button>
            </div>
            <div class="modal-body">
                <p>Se guardaran los cambios del programa actual.</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Cancelar</button>
                <button type="submit" class="btn btn-primary" form="editForm">Guardar cambios</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
