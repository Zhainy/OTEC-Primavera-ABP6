<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Portal - OTEC Primavera</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>
<div class="container">
    <header>
        <div class="logo"><i class="bi bi-hexagon-fill"></i> OTEC Primavera</div>
        <div class="admin-profile">
            <i class="bi bi-person-circle"></i> <span>Mi Perfil Estudiantil</span>
        </div>
    </header>

    <div class="glass-card" style="max-width: 800px; margin: 0 auto;">
        <h2><i class="bi bi-mortarboard-fill"></i> Mi Programa Actual</h2>

        <div style="background: rgba(0,0,0,0.3); padding: 2rem; border-radius: 8px; border: 1px solid var(--glass-border);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h3 style="color: var(--neon-blue); margin: 0;">Bootcamp Back-end Java</h3>
                <span class="badge active">En Curso</span>
            </div>
            <p style="color: var(--text-secondary); line-height: 1.6;">Estás cursando actualmente este programa. Recuerda revisar la plataforma de contenidos para tus próximas entregas.</p>

            <div style="margin-top: 2rem;">
                <div style="display: flex; justify-content: space-between; font-size: 0.9rem; font-weight: 600;">
                    <span>Progreso General</span>
                    <span style="color: var(--neon-blue);">45%</span>
                </div>
                <div class="progress-container">
                    <div class="progress-bar" style="width: 45%;"></div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
