<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mi Portal - OTEC Primavera</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>
<div class="container">
    <header>
        <div class="logo"><i class="bi bi-hexagon-fill"></i> OTEC Primavera</div>
        <div class="profile-menu">
            <button type="button" class="admin-profile profile-trigger" aria-haspopup="true" aria-expanded="false">
                <i class="bi bi-person-circle"></i>
                <span th:text="${nombreAlumno}">Mi Perfil Estudiantil</span>
                <i class="bi bi-chevron-down"></i>
            </button>
            <div class="profile-dropdown">
                <form th:action="@{/logout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="dropdown-link">
                        <i class="bi bi-box-arrow-right"></i> Cerrar sesion
                    </button>
                </form>
            </div>
        </div>
    </header>

    <div class="glass-card dashboard-narrow">
        <h2><i class="bi bi-mortarboard-fill"></i> Mi Programa Actual</h2>

        <div th:if="${matriculaActiva != null}" class="course-highlight">
            <div class="course-head">
                <h3 th:text="${matriculaActiva.curso.nombre}">Bootcamp Back-end Java</h3>
                <span class="badge active">En Curso</span>
            </div>
            <p class="course-text" th:text="${matriculaActiva.curso.descripcion ?: 'Sigue avanzando en tu ruta de aprendizaje para completar este programa.'}">
                Estas cursando actualmente este programa.
            </p>

            <div class="progress-block">
                <div class="progress-meta">
                    <span>Progreso General</span>
                    <span class="progress-value" th:text="${#numbers.formatDecimal(matriculaActiva.porcentajeProgreso, 1, 1)} + '%'">0%</span>
                </div>
                <div class="progress-container">
                    <div class="progress-bar" th:style="'width:' + ${matriculaActiva.porcentajeProgreso} + '%;'"></div>
                </div>
            </div>
        </div>

        <div th:if="${matriculaActiva == null}" class="table-empty">
            <i class="bi bi-info-circle"></i>
            Aun no tienes un curso en estado EN_CURSO.
        </div>
    </div>
</div>
</body>
</html>
