<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Error - OTEC Primavera</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>
<div class="container error-container">
    <div class="glass-card" style="max-width: 600px; margin: 0 auto; padding: 4rem 2rem;">
        <i class="bi bi-exclamation-triangle" style="font-size: 3rem; color: var(--status-inactive);"></i>
        <div class="error-code" th:text="${status ?: 'Error'}">404</div>
        <h2 style="justify-content: center;">Algo salió mal en el sistema</h2>
        <p style="color: var(--text-secondary); margin-bottom: 2rem;">
            No pudimos encontrar la ruta que solicitaste o ocurrió un error interno.
            <span th:text="${error}"></span>
        </p>
        <a href="/" class="btn-primary" style="text-decoration: none;">
            <i class="bi bi-house"></i> Volver al Inicio
        </a>
    </div>
</div>
</body>
</html>
